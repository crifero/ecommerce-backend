events {
  worker_connections 1024;
}

http {
  upstream products_upstream {
    server products-service:3001;
  }

  upstream orders_upstream {
    server orders-service:3002;
  }

  server {
    listen 80;
    server_name localhost;

    location /api/v1/products {
      proxy_pass http://products_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /products/docs {
      proxy_pass http://products_upstream/docs;
      proxy_set_header Host $host;
    }

    location /api/v1/orders {
      proxy_pass http://orders_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /orders/docs {
      proxy_pass http://orders_upstream/docs;
      proxy_set_header Host $host;
    }

    location /health {
      return 200 '{"status":"ok","gateway":"nginx"}';
      add_header Content-Type application/json;
    }
  }
}
