name: CI — Ecommerce Services

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  install:
    name: Install (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [products-service, orders-service]
    defaults:
      run:
        working-directory: apps/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install

  lint:
    name: Lint (${{ matrix.service }})
    needs: install
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [products-service, orders-service]
    defaults:
      run:
        working-directory: apps/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run lint

  build:
    name: Build (${{ matrix.service }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [products-service, orders-service]
    defaults:
      run:
        working-directory: apps/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build

  test:
    name: Test (${{ matrix.service }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [products-service, orders-service]
    defaults:
      run:
        working-directory: apps/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run test

  release:
    name: Version bump & Changelog
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version — products-service
        working-directory: apps/products-service
        run: npm version patch --no-git-tag-version

      - name: Bump patch version — orders-service
        working-directory: apps/orders-service
        run: npm version patch --no-git-tag-version

      - name: Generate CHANGELOG
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" ${LAST_TAG}..HEAD)
          fi
          DATE=$(date +%Y-%m-%d)
          PS_VERSION=$(node -p "require('./apps/products-service/package.json').version")
          OS_VERSION=$(node -p "require('./apps/orders-service/package.json').version")
          HEADER="## [products-service ${PS_VERSION} / orders-service ${OS_VERSION}] - ${DATE}"
          if [ -f CHANGELOG.md ]; then
            echo -e "${HEADER}\n\n${COMMITS}\n\n$(cat CHANGELOG.md)" > CHANGELOG.md
          else
            echo -e "# Changelog\n\n${HEADER}\n\n${COMMITS}" > CHANGELOG.md
          fi

      - name: Commit and push all version bumps
        run: |
          git add apps/products-service/package.json apps/orders-service/package.json CHANGELOG.md
          git commit -m "chore: bump versions and update changelog [skip ci]"
          git push

  simulate-deploy:
    name: Simulate Deploy (${{ matrix.service }})
    needs: [test, release]
    runs-on: ubuntu-latest
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.test.result == 'success'
    strategy:
      matrix:
        service: [products-service, orders-service]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image (simulation)
        working-directory: apps/${{ matrix.service }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "=== Simulating deploy of ${{ matrix.service }} ==="
          echo "Building Docker image: ${{ matrix.service }}:${VERSION}"
          echo "docker build -t ${{ matrix.service }}:${VERSION} ."
          echo "=== Deploy simulation complete ==="
