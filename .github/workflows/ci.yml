name: CI — Ecommerce Services

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  install:
    name: Install (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [products-service, orders-service]
    defaults:
      run:
        working-directory: apps/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/${{ matrix.service }}/package-lock.json
      - run: npm ci

  lint:
    name: Lint (${{ matrix.service }})
    needs: install
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [products-service, orders-service]
    defaults:
      run:
        working-directory: apps/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/${{ matrix.service }}/package-lock.json
      - run: npm ci
      - run: npm run lint

  build:
    name: Build (${{ matrix.service }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [products-service, orders-service]
    defaults:
      run:
        working-directory: apps/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/${{ matrix.service }}/package-lock.json
      - run: npm ci
      - run: npm run build

  test:
    name: Test (${{ matrix.service }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [products-service, orders-service]
    defaults:
      run:
        working-directory: apps/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/${{ matrix.service }}/package-lock.json
      - run: npm ci
      - run: npm run test

  release:
    name: Version bump & Changelog (${{ matrix.service }})
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        service: [products-service, orders-service]
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    defaults:
      run:
        working-directory: apps/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure git
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        id: bump
        run: |
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Generate CHANGELOG
        working-directory: .
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" ${LAST_TAG}..HEAD)
          fi
          NEW_VERSION=${{ steps.bump.outputs.new_version }}
          DATE=$(date +%Y-%m-%d)
          HEADER="## [${{ matrix.service }} ${NEW_VERSION}] - ${DATE}"
          if [ -f CHANGELOG.md ]; then
            echo -e "${HEADER}\n\n${COMMITS}\n\n$(cat CHANGELOG.md)" > CHANGELOG.md
          else
            echo -e "# Changelog\n\n${HEADER}\n\n${COMMITS}" > CHANGELOG.md
          fi

      - name: Commit version bump and changelog
        working-directory: .
        run: |
          git add apps/${{ matrix.service }}/package.json CHANGELOG.md
          git commit -m "chore(${{ matrix.service }}): bump version and update changelog [skip ci]"
          git push

  simulate-deploy:
    name: Simulate Deploy (${{ matrix.service }})
    needs: [test, release]
    runs-on: ubuntu-latest
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.test.result == 'success'
    strategy:
      matrix:
        service: [products-service, orders-service]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image (simulation)
        working-directory: apps/${{ matrix.service }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "=== Simulating deploy of ${{ matrix.service }} ==="
          echo "Building Docker image: ${{ matrix.service }}:${VERSION}"
          echo "docker build -t ${{ matrix.service }}:${VERSION} ."
          echo "=== Deploy simulation complete ==="
