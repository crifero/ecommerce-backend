version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: ecommerce_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce_pass
      POSTGRES_DB: ecommerce_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - ecommerce_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce -d ecommerce_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./apps/auth-service
      dockerfile: Dockerfile
    container_name: ecommerce_auth
    restart: unless-stopped
    environment:
      PORT: 3000
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ecommerce
      DB_PASS: ecommerce_pass
      DB_NAME: ecommerce_db
      JWT_SECRET: jwt_secret_change_in_production
      JWT_EXPIRES_IN: 24h
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecommerce_net

  products-service:
    build:
      context: ./apps/products-service
      dockerfile: Dockerfile
    container_name: ecommerce_products
    restart: unless-stopped
    environment:
      PORT: 3001
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ecommerce
      DB_PASS: ecommerce_pass
      DB_NAME: ecommerce_db
      DB_SCHEMA: products
      JWT_SECRET: jwt_secret_change_in_production
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - ecommerce_net

  orders-service:
    build:
      context: ./apps/orders-service
      dockerfile: Dockerfile
    container_name: ecommerce_orders
    restart: unless-stopped
    environment:
      PORT: 3002
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ecommerce
      DB_PASS: ecommerce_pass
      DB_NAME: ecommerce_db
      DB_SCHEMA: orders
      PRODUCTS_SERVICE_URL: http://products-service:3001
      JWT_SECRET: jwt_secret_change_in_production
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
      products-service:
        condition: service_started
    networks:
      - ecommerce_net

  gateway:
    image: nginx:alpine
    container_name: ecommerce_gateway
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - products-service
      - orders-service
    networks:
      - ecommerce_net

volumes:
  postgres_data:

networks:
  ecommerce_net:
    driver: bridge
